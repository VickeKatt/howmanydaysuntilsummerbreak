<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Cool Site?</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 20px;
    }

    .countdown {
      font-size: 72px;
      font-weight: bold;
      margin: 20px 0;
    }

    .label {
      font-size: 20px;
      opacity: 0.9;
    }

    .small {
      margin-top: 20px;
      font-size: 30px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>How many days until Summer Break?</h1>
    <div class="countdown" id="days">0</div>
    <div class="small" id="extra"></div>
  </div>

  <script>
    function updateCountdown() {
      const now = new Date();
      const target = new Date("2026-06-12T00:00:00");

      const diff = target - now;

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById("days").textContent = days > 0 ? days : 0;

      document.getElementById("extra").textContent =
        `${hours}h ${minutes}m ${seconds}s`;

      if (diff <= 0) {
        document.getElementById("days").textContent = "🎉";
        document.querySelector(".label").textContent = "Summer Break is here!";
      }
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
